<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Flood Doctor Local Dev</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>
      const host = window.location.hostname === '127.0.0.1' ? '127.0.0.1' : 'localhost';
      const target = `${window.location.protocol}//${host}:5174${window.location.pathname}${window.location.search}${window.location.hash}`;
      window.location.replace(target);
    </script>
  </head>
  <body></body>
</html>
